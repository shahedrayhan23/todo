<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KacheCare | Care Made Easy</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #fcf9f8 0%, #f6f3f2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            text-align: center;
            max-width: 600px;
            padding: 20px;
        }
        .logo {
            font-size: 3rem;
            margin-bottom: 10px;
        }
        h1 {
            color: #00452a;
            font-size: 2.5rem;
            font-weight: 700;
            margin: 0 0 10px 0;
        }
        .tagline {
            color: #785900;
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 30px;
        }
        .loader {
            margin: 30px auto;
        }
        .spinner {
            border: 4px solid #f3f0f0;
            border-top: 4px solid #00452a;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .message {
            color: #404942;
            font-size: 1rem;
            margin-bottom: 30px;
        }
        .links {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-top: 20px;
        }
        .link {
            display: inline-block;
            padding: 12px 24px;
            background: white;
            color: #00452a;
            text-decoration: none;
            border-radius: 12px;
            font-weight: 600;
            transition: all 0.3s ease;
            border: 2px solid #e4e2e1;
        }
        .link:hover {
            background: #00452a;
            color: white;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(0, 69, 42, 0.2);
        }
        .link.primary {
            background: #00452a;
            color: white;
            border-color: #00452a;
        }
        .link.primary:hover {
            background: #296a4a;
            border-color: #296a4a;
        }
        .link.secondary {
            background: #785900;
            color: white;
            border-color: #785900;
        }
        .link.secondary:hover {
            background: #5b4300;
            border-color: #5b4300;
        }
        .countdown {
            font-size: 0.9rem;
            color: #707972;
            margin-top: 20px;
        }
        @media (max-width: 640px) {
            h1 {
                font-size: 2rem;
            }
            .tagline {
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">💚</div>
        <h1>KacheCare</h1>
        <div class="tagline">Care Made Easy. Trust Built Local.</div>
        
        <div class="loader">
            <div class="spinner"></div>
            <p class="message">Redirecting to home page...</p>
        </div>

        <div class="links">
            <a href="kasecare_home/code.html" class="link primary">🏠 Go to Home Page Now</a>
            <a href="QUICK_START.html" class="link secondary">🚀 View Quick Start Guide</a>
            <a href="navigation-test.html" class="link">🧭 Test Navigation</a>
            <a href="sitemap.html" class="link">🗺️ View Site Map</a>
        </div>

        <div class="countdown">
            <p>Auto-redirecting in <span id="countdown">3</span> seconds...</p>
            <p style="font-size: 0.8rem; margin-top: 10px;">
                Click any link above to skip the wait
            </p>
        </div>
    </div>

    <script>
        // Countdown timer
        let seconds = 3;
        const countdownElement = document.getElementById('countdown');
        
        const timer = setInterval(() => {
            seconds--;
            countdownElement.textContent = seconds;
            
            if (seconds <= 0) {
                clearInterval(timer);
            }
        }, 1000);

        // Redirect after 3 seconds
        setTimeout(function() {
            window.location.href = 'kasecare_home/code.html';
        }, 3000);
    </script>
</body>
</html>
